    name: PDF Monkey API
    description: >-
      REST API for generating, managing, and retrieving PDF documents using
      Handlebars templates and JSON data payloads. Supports asynchronous and
      synchronous generation modes, document lifecycle management, and webhook
      notifications for real-time event handling.
    humanURL: https://pdfmonkey.io/docs/
