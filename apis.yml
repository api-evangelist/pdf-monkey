aid: pdf-monkey
name: PDF Monkey
description: >-
  PDF Monkey is a PDF generation REST API that uses Handlebars templates to
  produce high-quality PDFs from JSON data. Developers build templates in a
  visual dashboard, call the API with dynamic JSON payloads, and retrieve
  generated documents via signed download URLs or webhooks. The service supports
  document management, asynchronous and synchronous generation, webhook
  notifications powered by Svix, fillable PDF forms, password protection, and
  integrations with Zapier, Make, and n8n.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/pdf-monkey/refs/heads/main/apis.yml
